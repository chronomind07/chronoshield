version: "3.9"

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app

  beat:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app

  flower:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.workers.celery_app flower --port=5555

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.local
    command: npm run dev

networks:
  default:
    name: chronoshield
